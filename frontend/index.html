<!DOCTYPE html>
<html>
<head>
    <title>Insta Audio Player</title>

    <style>

        body{
        margin:0;
        font-family:Segoe UI;
        background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        color:white;
        text-align:center;
        }

        h1{
        margin-top:40px;
        font-size:40px;
        }

        .container{
        width:600px;
        margin:auto;
        background:#1c1c1c;
        padding:30px;
        border-radius:15px;
        box-shadow:0 10px 40px rgba(0,0,0,0.6);
        }

        input{
        padding:10px;
        margin:10px;
        background:#333;
        color:white;
        border:none;
        border-radius:8px;
        }

        button{
        padding:12px;
        margin:10px;
        border:none;
        border-radius:8px;
        background:#00c6ff;
        background:linear-gradient(45deg,#00c6ff,#0072ff);
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
        }

        button:hover{
        transform:scale(1.05);
        }

        #playlist button{
        display:block;
        width:90%;
        margin:8px auto;
        background:#222;
        }

        #playlist button:hover{
        background:#0072ff;
        }

        iframe{
        margin-top:25px;
        border-radius:10px;
        box-shadow:0 10px 30px rgba(0,0,0,0.8);
        }

    </style>

</head>

<body>

<h1>🎧 Insta Audio Player</h1>

<div class="container">

    <input type="file" id="image">

    <br>

    <button onclick="upload()">Generate Playlist</button>

    <div id="playlist"></div>

    <iframe id="player"
            width="100%"
            height="315"
            frameborder="0"
            allowfullscreen>
    </iframe>

</div>

<script>

    async function upload(){

    let file = document.getElementById("image").files[0]

    let formData = new FormData()

    formData.append("image",file)

    let res = await fetch("http://localhost:8080/upload",{
    method:"POST",
    body:formData
    })

    let songs = await res.json()

    let playlist = document.getElementById("playlist")

    playlist.innerHTML=""

    songs.forEach(song => {

    let btn = document.createElement("button")

    btn.innerText = "▶ " + song.title

    btn.onclick = () => play(song.videoId)

    playlist.appendChild(btn)

    })

    }

    function play(videoId){

    document.getElementById("player").src =
    "https://www.youtube.com/embed/" + videoId

    }

</script>

</body>
</html>
