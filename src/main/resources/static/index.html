<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insta Audio Player</title>

    <style>
        body {
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 10px;
        }

        /* BUTTON */
        button {
            padding: 10px 15px;
            background: #00aaff;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #008ecc;
        }

        /* LIST */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px;
            margin: 5px 0;
            background: #2a2a2a;
            border-radius: 5px;
            cursor: pointer;
        }

        li:hover {
            background: #3a3a3a;
        }

        /* 🔥 LOADER */
        #loaderContainer {
            display: none;
            margin-top: 15px;
        }

        #progressBar {
            width: 100%;
            height: 20px;
            background: #444;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            width: 0%;
            background: #00ffcc;
            transition: width 0.3s;
        }

        #progressText {
            margin-top: 5px;
            font-size: 14px;
        }

    </style>
</head>

<body>

<h1>🎧 Insta Audio Player</h1>

<div class="container">

    <!-- Upload -->
    <input type="file" id="imageInput" multiple>
    <br>
    <button onclick="generatePlaylist()">Generate Playlist</button>

    <!-- 🔥 LOADER -->
    <div id="loaderContainer">
        <div id="progressBar">
            <div id="progress"></div>
        </div>
        <div id="progressText">0%</div>
    </div>

    <!-- Song List -->
    <ul id="songList"></ul>

    <!-- Play All -->
    <button onclick="playAll()">▶ Play All</button>

</div>

<script>

    let songsData = [];
    let progressInterval;

    // 🔹 REMOVE DUPLICATES
    function removeDuplicates(songs) {
        let map = new Map();

        songs.forEach(song => {
            if (song.videoId && song.videoId.length === 11) {
                map.set(song.videoId, song);
            }
        });

        return Array.from(map.values());
    }

    // 🔹 GENERATE PLAYLIST
    async function generatePlaylist() {

        let files = document.getElementById("imageInput").files;

        if (files.length === 0) {
            alert("Please upload at least one image!");
            return;
        }

        document.getElementById("loaderContainer").style.display = "block";

        let allSongs = [];
        let completed = 0;

        for (let file of files) {

            let formData = new FormData();
            formData.append("image", file);

            try {
                let res = await fetch("http://localhost:8080/upload", {
                    method: "POST",
                    body: formData
                });

                let data = await res.json();

                allSongs = allSongs.concat(data);

            } catch (err) {
                console.log(err);
            }

            completed++;

            // 🔥 update progress based on number of files
            let percent = Math.floor((completed / files.length) * 100);
            updateProgress(percent);
        }

        songsData = removeDuplicates(allSongs);

        displaySongs(songsData);

        setTimeout(() => {
            document.getElementById("loaderContainer").style.display = "none";
        }, 500);
    }


    // 🔹 UPDATE PROGRESS
    function updateProgress(value) {
        document.getElementById("progress").style.width = value + "%";
        document.getElementById("progressText").innerText = value + "%";
    }


    // 🔹 DISPLAY SONGS
    function displaySongs(songs) {
        let list = document.getElementById("songList");
        list.innerHTML = "";

        songs.forEach(song => {
            let li = document.createElement("li");
            li.innerText = "🎵 " + song.title;

            li.onclick = () => {
                if (song.videoId && song.videoId.length === 11) {
                    window.open("https://www.youtube.com/watch?v=" + song.videoId, "_blank");
                } else {
                    alert("Invalid video!");
                }
            };

            list.appendChild(li);
        });
    }


    // 🔥 PLAY ALL
    function playAll() {

        if (songsData.length === 0) {
            alert("No songs loaded!");
            return;
        }

        let videoIds = songsData
            .map(song => song.videoId)
            .filter(id => id && id.length === 11);

        if (videoIds.length === 0) {
            alert("No valid videos found!");
            return;
        }

        let url = "https://www.youtube.com/watch_videos?video_ids=" + videoIds.join(",");

        window.open(url, "_blank");
    }

</script>

</body>
</html>
